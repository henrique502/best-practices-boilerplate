<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b2d"/>
      <stop offset="100%" style="stop-color:#1a2940"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg-gradient)" stroke="#5ec4dc" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Code brackets centered using dominant-baseline -->
  <text x="60" y="60" font-family="Brush Script MT" font-size="48" font-weight="bold" fill="#5ec4dc" text-anchor="middle" dominant-baseline="central">&lt; /&gt;</text>
</svg>
